<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEON MAZE // 사이버펑크 미로 탈출</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0a0a0f;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        font-family: "Rajdhani", sans-serif;
      }

      canvas {
        display: block;
        border: 2px solid #0ff3;
        box-shadow:
          0 0 20px #0ff2,
          0 0 60px #0ff1,
          inset 0 0 20px #0ff1;
      }
    </style>
  </head>
  <body>
    <!-- Game Modules: loaded in dependency order -->
    <script src="src/constants.js"></script>
    <script src="src/utils.js"></script>
    <script src="src/Cell.js"></script>
    <script src="src/MazeGenerator.js"></script>
    <script src="src/Player.js"></script>
    <script src="src/Blackout.js"></script>
    <script src="src/MazeShifter.js"></script>
    <script src="src/HUD.js"></script>
    <script src="src/Game.js"></script>
    <script src="src/sketch.js"></script>
  </body>
</html>
